version: 2

sources:
  # Landed / cloned tables in **TRANSFORM.DEV** that are not built as dbt models in this repo.
  # Register each table here when a model uses `source('transform_dev', '<name>')`.
  - name: transform_dev
    database: TRANSFORM
    schema: DEV
    description: >
      External **TRANSFORM.DEV** relations (CTAS, clones, or Jon pipeline outputs) consumed by read-through `FACT_*` views.
      See **MIGRATION_TASKS_COSTAR.md** §1.5 for CoStar MF DataExport inventory.

    tables:
      - name: fact_costar_cbsa_monthly
        identifier: FACT_COSTAR_CBSA_MONTHLY
        description: >
          Wide MF CoStar DataExport at CBSA-monthly grain (**DS_034**). Physical name may differ by account;
          if yours differs, add a **sources** patch in `packages.yml` / dbt project override or land a synonym view
          **`FACT_COSTAR_CBSA_MONTHLY`** in **TRANSFORM.DEV**.

      - name: fact_markerr_crime_h3_r8_snapshot
        identifier: FACT_MARKERR_CRIME_H3_R8_SNAPSHOT
        description: >
          Markerr crime indices at H3 R8 hex grain (national snapshot). Consumed by **concept_crime_market_annual**
          for CBSA means across hexes.
