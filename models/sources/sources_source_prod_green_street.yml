        identifier: GS_MACRO_MARKET_TOP50_RAW
        description: "Macro market monthly fundamentals — top-50 markets (VARIANT V)."
      - name: gs_market_forecast_base_top50_raw
        identifier: GS_MARKET_FORECAST_BASE_TOP50_RAW
        description: "Baseline scenario quarterly forecast — top-50 markets (VARIANT V)."
