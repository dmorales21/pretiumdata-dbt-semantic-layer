version: 2

sources:
  # SOURCE_PROD.GREEN_STREET — VARIANT raw panels (Jon load). Parity with pretium-ai-dbt `green_street` source.
  - name: green_street
    database: SOURCE_PROD
    schema: GREEN_STREET
    description: >
      GreenStreet Advisors economic projection and macro market data (VARIANT column V on raw tables).

    tables:
