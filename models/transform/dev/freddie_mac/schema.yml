version: 2

models:
  - name: fact_freddie_mac_housing_national_weekly
    description: >
      **Vendor:** Freddie Mac (Primary Mortgage Market Survey and related) on **`SOURCE_SNOW.US_REAL_ESTATE`**
      `FREDDIE_MAC_HOUSING_*`. Long-form **GEO × date × variable** with REFERENCE.GEOGRAPHY join; national grain when index misses.
      Catalog **DS_083** / **MET_019** (`vendor_code` freddie_mac).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['date_reference', 'variable']
    columns:
      - name: date_reference
        tests: [not_null]
      - name: variable
        tests: [not_null]
      - name: value
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -1000000
                max_value: 1000000000
                inclusive: true
