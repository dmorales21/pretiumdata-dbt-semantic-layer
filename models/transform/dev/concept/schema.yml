version: 2

models:
  - name: concept_rent_market_monthly
    description: >
      Market rent concept, monthly. **Vendors:** ZILLOW, APARTMENTIQ, YARDI_MATRIX, COSTAR (``SCENARIOS`` quarter→month linear),
      **markerr** (catalog ``vendor_code``; MF CBSA via ``fact_markerr_rent_property_cbsa_monthly`` + SFR ZIP rollup via ``fact_markerr_rent_sfr`` — use ``metric_id_observe`` to tell the two lines apart), HUD_CYBERSYN (``fact_hud_housing_series``
      CBSA rows matching rent regex — often **0 rows** until ACS-style variables exist), CHERRE (stub).
      **Geo alignment:** ZIP vendors use ``reference_geo_zip_to_cbsa_ctes``; CBSA vendors use ``LPAD(...,5,'0')`` on CBSA codes.
      For ``geo_level_code = cbsa``, ``geo_id`` = ``cbsa_id``.
      **Semantic contract:** [`CONTRACT_RENT_AVM_VALUATION.md`](../../../docs/reference/CONTRACT_RENT_AVM_VALUATION.md).
      **Success contract (pipeline QA):** (1) **CHERRE** branch is a typed **stub** — **0 output rows** is PASS (``WHERE 1 = 0``).
      (2) **HUD_CYBERSYN** — **0 rows** is PASS when Cybersyn variables do not match ``concept_rent_market_hud_variable_regex`` or HUD slice is empty;
      set ``concept_rent_market_hud_include: false`` to omit the HUD branch entirely. (3) **Non-stub vendors** — any row emitted must have
      non-null ``concept_code``, ``vendor_code``, ``month_start``, ``geo_level_code``, ``geo_id`` (Zillow may use **zip** or **cbsa** grain; others are **cbsa**).
      See [`QA_CONCEPT_PREFLIGHT_CHECKLIST.md`](../../../docs/migration/QA_CONCEPT_PREFLIGHT_CHECKLIST.md) §B.
    meta:
      parent_fact_models:
        - fact_zillow_rentals
        - fact_zillow_rental_forecasts
        - fact_hud_housing_series
      parent_sources:
        - source:transform_apartmentiq.propertykpi_bh
        - source:transform_apartmentiq.property_bh
        - source:transform_yardi_matrix.marketperformance_bh
        - source:transform_yardi_matrix.submarketmatchzipzcta_bh
        - source:transform_costar.scenarios
        - source:transform_markerr.rent_property_cbsa_monthly
        - source:transform_markerr.markerr_rent_sfr
      governance: docs/migration/PLAYBOOK_ANALYTICS_FEATURES_FROM_CATALOG.md §M.7 Pilot A lineage
    config:
      tags: ["semantic", "concept", "rent", "rent_market"]
    columns:
      - name: concept_code
        description: Registry slug; ``rent_market`` for this object.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["rent_market"]
      - name: vendor_code
        description: >
          ``ZILLOW`` | ``APARTMENTIQ`` | ``YARDI_MATRIX`` | ``COSTAR`` | ``markerr`` | ``HUD_CYBERSYN`` | ``CHERRE`` (stub).
          **Markerr:** MF CBSA and SFR CBSA-aggregated lines both use catalog ``vendor_code = markerr``; discriminate with ``metric_id_observe``
          (``markerr_avg_rent_effective`` vs ``markerr_rent_asking_mean_zip_agg_cbsa``) and MF bedroom/class dbt vars.
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  [
                    "cbsa",
                    "zip",
                    "county",
                    "state",
                    "national",
                    "zcta",
                    "city",
                    "place",
                    "corridor_h3",
                    "metro_division",
                  ]
      - name: geo_id
        tests: [not_null]
      - name: cbsa_id
      - name: county_fips
      - name: state_fips
      - name: rent_current
      - name: rent_historical
      - name: rent_forecast
      - name: metric_id_observe
      - name: metric_id_forecast
      - name: forecast_month_start

  - name: concept_rent_property_monthly
    description: >
      Property rent concept, monthly. **Vendors:** APARTMENTIQ (property KPI + property master, ZIP→same geography spine
      for ``cbsa_id`` / ``county_fips`` / ``state_fips``), CHERRE and YARDI_MATRIX as typed zero-row stubs (Matrix has no
      property grain in TRANSFORM today). Align to market rent at CBSA via shared ``cbsa_id`` / county keys.
      **Success contract:** (1) **CHERRE** / **YARDI_MATRIX** stubs — **0 rows** is PASS. (2) **APARTMENTIQ** rows must have
      non-null ``month_start``, ``property_natural_key``, ``geo_level_code`` = ``property``, ``geo_id``, and rent slots where defined.
      See [`QA_CONCEPT_PREFLIGHT_CHECKLIST.md`](../../../docs/migration/QA_CONCEPT_PREFLIGHT_CHECKLIST.md) §B.
    config:
      tags: ["semantic", "concept", "rent", "rent_property"]
    columns:
      - name: concept_code
        description: Registry slug; ``rent_property``.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["rent_property"]
      - name: property_natural_key
        description: Vendor-stable property id (ApartmentIQ uses ``TO_VARCHAR(PROPERTYID)``).
        tests: [not_null]
      - name: vendor_code
        description: "``APARTMENTIQ`` | ``CHERRE`` (stub) | ``YARDI_MATRIX`` (stub)."
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["property"]
      - name: geo_id
        tests: [not_null]

  - name: concept_avm_market_monthly
    description: >
      Market AVM concept. **Cherre** ``USA_AVM_GEO_STATS`` at ``GEOGRAPHY_TYPE = 'MA'`` (CBSA), snapshot ``month_start``;
      ``avm_historical`` / ``avm_forecast`` NULL until monthly AVM facts land. **Redfin** stub (empty).
      **Contract + QA:** [`CONTRACT_RENT_AVM_VALUATION.md`](../../../docs/reference/CONTRACT_RENT_AVM_VALUATION.md) —
      ``QA_FRESHNESS_STALENESS_REPORT`` excludes this object (snapshot time truth).
      **Success contract:** (1) **REDFIN** branch — **0 rows** is PASS (typed stub). (2) **CHERRE** — **0 rows** is PASS if
      `cherre_avm_geo_stats` is empty or role lacks **SELECT** on **TRANSFORM.CHERRE** (pipeline gap, not a failing test).
      (3) Any **CHERRE** row must satisfy MA filter and non-null ``MEDIAN_ESTIMATED_VALUE`` per SQL.
      See [`QA_CONCEPT_PREFLIGHT_CHECKLIST.md`](../../../docs/migration/QA_CONCEPT_PREFLIGHT_CHECKLIST.md) §B.
    config:
      tags: ["semantic", "concept", "avm", "avm_market"]
    columns:
      - name: concept_code
        description: "Registry slug: avm_market."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["avm_market"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: avm_current
      - name: avm_historical
      - name: avm_forecast

  - name: concept_valuation_market_monthly
    description: >
      Market valuation concept. **Cherre** MA/CBSA snapshot (`AVG_ESTIMATED_VALUE`), **Zillow** home-values
      + forecasts, and **FHFA** CBSA slices (`fact_fhfa_house_price_cbsa`, `fact_fhfa_uniform_appraisal_cbsa`).
      **Contract:** [`CONTRACT_RENT_AVM_VALUATION.md`](../../../docs/reference/CONTRACT_RENT_AVM_VALUATION.md).
      **FHFA UAD:** optional ``vars.concept_valuation_fhfa_uad_variable_regex`` filters ``VARIABLE`` when non-empty.
    config:
      tags: ["semantic", "concept", "valuation", "valuation_market"]
    columns:
      - name: concept_code
        description: "Registry slug: valuation_market."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["valuation_market"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: valuation_current
      - name: valuation_historical
      - name: valuation_forecast

  - name: concept_listings_market_monthly
    description: >
      Listings (on-market channel) concept at CBSA grain from Realtor inventory plus Zillow DOM/price-cuts and
      for-sale listings. Uses one prioritized metric per Zillow source via configurable metric-id pattern vars
      ``concept_listings_market_zillow_*`` (defaults); legacy overrides ``concept_absorption_market_zillow_*`` are
      still read as fallbacks so older project vars keep working.
    config:
      tags: ["semantic", "concept", "listings"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["listings"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: listings_current
      - name: listings_historical
      - name: listings_forecast

  - name: concept_absorption_market_monthly
    description: >
      **Absorption** (market clearing / net demand vs supply flow) at CBSA × month — **not** listings, DOM, vacancy,
      or closed transaction counts. Primary branch: CoStar MF DataExport ``ABSORPTION_UNITS`` on
      ``fact_costar_mf_market_cbsa_monthly`` (observe rows, Multifamily slice via
      ``concept_absorption_market_costar_property_type_pattern``). Zillow DOM / for-sale inventory stay on
      ``concept_listings_market_monthly``. Silver upstream is CBSA-native; county absorption would require a new FACT grain.
    meta:
      spatial_grains_emitted: [cbsa]
    config:
      tags: ["semantic", "concept", "absorption"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["absorption"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: absorption_current
      - name: absorption_historical
      - name: absorption_forecast

  - name: concept_transactions_market_monthly
    description: >
      Transactions concept at **CBSA** grain (**Zillow** ``fact_zillow_sales`` observe + trailing-12m historical slot)
      plus optional **Cherre Recorder** SFR/MF, **RCA MF transactions**, **Zonda deeds**, and **Zonda SFR** CBSA rollups from
      ``TRANSFORM.DEV`` FACTs via ``source('transform_dev_corridor_transaction_facts', …)``. **County:** **Cherre + RCA** use
      **vendor-native** ``FACT_*_COUNTY_MONTHLY`` in the same source (pretium-ai-dbt ``analytics/facts`` physicalized to
      ``TRANSFORM.DEV`` when ``analytics_facts_to_transform_dev`` is true). **Zonda** county arms use H3 ×
      ``int_h3_r8_hex_dominant_county`` until native county FACTs exist. **Run order:** pretium-ai-dbt
      ``dbt run --select +vendor_native_geography_pipeline`` (``analytics_facts_to_transform_dev``), then this concept.
      Disable Cherre/RCA/Zonda deeds with ``vars.concept_transactions_include_cherre_rca_zonda: false``. Disable **Zonda SFR** only with
      ``vars.concept_transactions_include_zonda_sfr: false``. **0 rows** for a vendor branch is PASS when the upstream FACT is empty.
    config:
      tags: ["semantic", "concept", "transactions"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["transactions"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa", "county"]
      - name: geo_id
        tests: [not_null]
      - name: transactions_current
      - name: transactions_historical
      - name: transactions_forecast

  - name: concept_home_price_market_monthly
    description: >
      Home-price concept at CBSA grain from Zillow home values (current + forecast), FHFA CBSA slices,
