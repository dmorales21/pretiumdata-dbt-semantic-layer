  - name: concept_crime_market_annual
    description: >
      Crime concept — annual **CBSA** from Markerr ``FACT_MARKERR_CRIME_H3_R8_SNAPSHOT`` (mean of hex-level indices within CBSA;
      ``month_start`` = Dec 31 of ``concept_acs5_cbsa_reference_year``). **0 rows** is PASS when the snapshot is empty in **TRANSFORM.DEV**.
      County or ZIP grains are not emitted here (hex→CBSA only); county-native Markerr crime feeds are a separate promotion path.
    meta:
      spatial_grains_emitted: [cbsa]
    config:
      tags: ["semantic", "concept", "crime"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["crime"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: crime_current
      - name: crime_historical
      - name: crime_forecast

  - name: concept_occupancy_market_monthly
    description: >
      Occupancy concept — monthly **CBSA** from ``fact_hud_housing_series_cbsa_monthly`` (one prioritized ``metric_id_observe``
      per CBSA × month via ``ROW_NUMBER``) and native **county** rows from ``fact_hud_housing_series_county_monthly``
      (``vendor_code = HUD_CYBERSYN_COUNTY``; all matching series). Both branches filter with ``concept_occupancy_market_hud_variable_regex``
      (default ``occupancy|vacancy``), mirroring the vacancy concept’s HUD county pattern without duplicating ACS H3 vacancy shares
      (those stay on ``concept_vacancy_market_monthly``).
      **Success contract (HUD):** **0 rows** is PASS when the HUD slice has no rows matching the regex or grants are missing.
      See [`QA_CONCEPT_PREFLIGHT_CHECKLIST.md`](../../../docs/migration/QA_CONCEPT_PREFLIGHT_CHECKLIST.md) §B.
    meta:
      spatial_grains_emitted: [cbsa, county]
      primary_upstream_facts:
        - fact_hud_housing_series_cbsa_monthly
        - fact_hud_housing_series_county_monthly
    config:
      tags: ["semantic", "concept", "occupancy"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["occupancy"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa", "county"]
      - name: geo_id
        tests: [not_null]
      - name: occupancy_current
      - name: occupancy_historical
      - name: occupancy_forecast

