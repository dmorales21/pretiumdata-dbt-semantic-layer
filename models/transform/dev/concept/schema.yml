        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: valuation_current
      - name: valuation_historical
      - name: valuation_forecast

