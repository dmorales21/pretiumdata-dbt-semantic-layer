      to CBSA (**sfr_inventory_uc_wavg** sum). Disable Markerr + RCA with ``vars.concept_supply_pipeline_include_markerr_rca: false``.
      Disable Zonda SFR with ``vars.concept_supply_pipeline_include_zonda_sfr: false``. **0 rows** for a vendor branch is PASS when upstream
      has no matching metrics or empty facts.
    config:
      tags: ["semantic", "concept", "supply_pipeline", "pipeline"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["supply_pipeline"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: supply_pipeline_current
      - name: supply_pipeline_historical
      - name: supply_pipeline_forecast

