        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["school_quality"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa", "county"]
      - name: geo_id
        tests: [not_null]
      - name: school_quality_current
      - name: school_quality_historical
      - name: school_quality_forecast

