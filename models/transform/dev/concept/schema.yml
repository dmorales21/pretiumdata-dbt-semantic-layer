      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa"]
      - name: geo_id
        tests: [not_null]
      - name: homeprice_current
      - name: homeprice_historical
      - name: homeprice_forecast

  - name: concept_employment_market_monthly
    description: >
      Employment concept from BLS LAUS: **CBSA** branch uses ``fact_bls_laus_cbsa_monthly`` (``AREA_CODE`` observe-only,
      not guaranteed OMB CBSA; ``has_census_geo`` false). **County** branch uses ``fact_bls_laus_county`` (measure 5).
      **State** branch sums county employment (measure 5) by two-digit state FIPS.
    config:
      tags: ["semantic", "concept", "employment"]
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["employment"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa", "county", "state"]
      - name: geo_id
        tests: [not_null]
      - name: employment_current
      - name: employment_historical
      - name: employment_forecast

  - name: concept_unemployment_market_monthly
    description: >
      Unemployment concept from BLS LAUS: **CBSA** branch (``fact_bls_laus_cbsa_monthly`` — rate + unemployed count),
      **county** branch (``fact_bls_laus_county`` measures 3 and 4) with ``vendor_code`` = ``BLS_LAUS_COUNTY``, and
      **state** branch (``BLS_LAUS_STATE``) aggregating county unemployed (measure 4) and labor force (measure 6).
    config:
      tags: ["semantic", "concept", "unemployment"]
    tests:
      - fact_semantic_bundle:
          arguments:
            date_column: month_start
            geo_id_column: geo_id
            geo_level_column: geo_level_code
            enforce_geography_join: false
            max_future_days: 0
            min_calendar_year: 1990
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              ['month_start', 'geo_level_code', 'geo_id', 'vendor_code', 'metric_id_observe']
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(metric_id_observe not ilike '%unemployment_rate%') or (unemployment_current is null) or (unemployment_current >= 0 and unemployment_current <= 100)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(metric_id_observe ilike '%unemployment_rate%') or (unemployment_current is null) or (unemployment_current >= 0)"
    columns:
      - name: concept_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["unemployment"]
      - name: vendor_code
        tests: [not_null]
      - name: month_start
        tests: [not_null]
      - name: geo_level_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["cbsa", "county", "state"]
      - name: geo_id
        tests: [not_null]
      - name: metric_id_observe
        description: >
          Vendor-native measure discriminator for this long union (rate vs level rows share ``concept_metric_slot`` names).
        tests: [not_null]
      - name: unemployment_current
      - name: unemployment_historical
      - name: unemployment_forecast

  - name: concept_school_quality_market_annual
    description: >
      School quality concept — annual **CBSA** spine (``month_start`` = Dec 31 of ``concept_acs5_cbsa_reference_year``):
      **Stanford SEDA** enrollment-weighted rollups from ``fact_stanford_seda_h3_r8_snapshot``; optional **ACS5** branch
      from ``fact_census_acs5_h3_r8_snapshot`` at CBSA and **county** (via ``int_acs5_h3_r8_county_demographics_rollups``;
      disable with ``vars.concept_school_quality_include_acs_branch: false``).
    config:
      tags: ["semantic", "concept", "school_quality"]
    columns:
