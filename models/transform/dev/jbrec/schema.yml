      tags: ["transform", "transform_dev", "jbrec", "fact_jbrec", "sfr", "observe_only"]

  - name: fact_jbrec_btr_rent_occupancy_cleaned
    description: >
      **SOURCE_PROD.JBREC.BTR_RENT_AND_OCCUPANCY** with CBSA remap, currency/% parsing, and DFW MDivision collapse — same contract as **pretium-ai-dbt** ``cleaned_jbrec_btr_rent_and_occupancy``.
    config:
      tags: ["transform", "transform_dev", "jbrec", "fact_jbrec", "rent"]
