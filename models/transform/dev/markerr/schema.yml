version: 2

models:
  - name: fact_markerr_rent_property_cbsa_monthly
    description: >
      Read-through of **TRANSFORM.MARKERR.RENT_PROPERTY_CBSA_MONTHLY**. CBSA × month MF aggregates; catalog **MET_044** / **MET_045**.
    config:
      tags: ["transform", "transform_dev", "markerr", "fact_markerr"]
    data_tests:
      - dbt_utils.equal_rowcount:
          compare_model: source('transform_markerr', 'rent_property_cbsa_monthly')
          config:
            enabled: "{{ var('semantic_layer_qa_transform_dev_bound_tests', false) }}"
      - dbt_utils.expression_is_true:
          expression: "(AVG_RENT_EFFECTIVE is null) or (AVG_RENT_EFFECTIVE > 0 and AVG_RENT_EFFECTIVE <= 100000)"
          config:
            enabled: "{{ var('semantic_layer_qa_transform_dev_bound_tests', false) }}"
      - dbt_utils.expression_is_true:
          expression: "(AVG_RENT_ASKING is null) or (AVG_RENT_ASKING > 0 and AVG_RENT_ASKING <= 100000)"
          config:
            enabled: "{{ var('semantic_layer_qa_transform_dev_bound_tests', false) }}"
    columns:
      - name: AVG_RENT_EFFECTIVE
        description: Catalog **MET_044**.
      - name: AVG_RENT_ASKING
        description: Catalog **MET_045**.

  - name: fact_markerr_rent_sfr
    description: >
      Read-through of **TRANSFORM.MARKERR.MARKERR_RENT_SFR** (SFR ZIP series for rollup in ``concept_rent_market_monthly``).
    config:
      tags: ["transform", "transform_dev", "markerr", "fact_markerr"]
