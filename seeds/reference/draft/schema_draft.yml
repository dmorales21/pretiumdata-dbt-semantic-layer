version: 2

# REFERENCE.DRAFT seeds — Alex owns
# Objects here are in-progress; promote to REFERENCE.CATALOG on owner approval
# catalog_metric (CATALOG_METRIC) promotes to metric in REFERENCE.CATALOG once TRANSFORM.FACT exists

seeds:
  - name: catalog_metric
    description: >
      Working metric registry for development. Header-only until TRANSFORM.FACT is built.
      Promotes to REFERENCE.CATALOG.metric once canonical fact tables exist and
      snowflake_column + table_path can be populated accurately.
    config:
      schema: DRAFT
    columns:
      - name: metric_id
        tests: [not_null, unique]
      - name: metric_code
        tests: [not_null, unique]
      - name: metric_label
        tests: [not_null]
      - name: definition
        tests: [not_null]
      - name: concept_code
        tests: [not_null]
      - name: vendor_code
        description: Null if is_derived = TRUE
      - name: is_derived
        tests: [not_null]
      - name: source_vendor_codes
        description: Comma-separated when is_derived = TRUE
      - name: unit
        tests: [not_null]
      - name: direction
        tests: [not_null]
      - name: geo_level_code
        tests: [not_null]
      - name: frequency_code
        tests: [not_null]
      - name: is_active
        tests: [not_null]
      - name: data_status_code
        tests: [not_null]
      - name: snowflake_column
        description: Exact column name; populate once TRANSFORM.FACT tables exist
      - name: table_path
        description: Fully qualified TRANSFORM.FACT path; populate once tables exist
      - name: metric_category_code
        tests: [not_null]
      - name: is_opco_metric
        tests: [not_null]

  - name: qa_tract_zcta_harmonized_parquet_manifest
    description: >
      Expected harmonized tract / ZCTA boundary parquet objects (NHGIS-style naming)
      for QA against a Snowflake stage or external inventory. Lives in REFERENCE.DRAFT
      until promoted to REFERENCE.CATALOG or replaced by automated stage LIST output.
      Does not land raw geometry in TRANSFORM.DEV; use SOURCE_PROD / RAW per SCHEMA_RULES
      for physical parquet loads.
    config:
      schema: DRAFT
    columns:
      - name: file_name
        tests: [not_null, unique]
      - name: geo_unit
        tests: [not_null]
      - name: schema_year
        tests: [not_null]
      - name: approx_size_mb
        tests: [not_null]
      - name: source_note
        tests: [not_null]
