version: 2
seeds:
- name: geo_level
  description: 'Canonical geography grain vocabulary for REFERENCE.CATALOG.geo_level plus SOURCE_SNOW Cybersyn GEOGRAPHY_INDEX.LEVEL
    crosswalk (source_snow_cybersyn_level). Single source of truth for geo levels.

    '
  config:
    schema: CATALOG
    full_refresh: true
  columns:
  - name: geo_level_id
    tests:
    - not_null
    - unique
  - name: geo_level_code
    tests:
    - not_null
    - unique
    - accepted_values:
        arguments:
          values:
          - property
          - zip
          - county
          - cbsa
          - state
          - national
          - zcta
          - tract
          - block_group
          - city
          - country
          - metro_division
          - census_region
          - census_division
          - county_subdivision
          - admin1
          - territory
          - disputed_territory
          - airport
          - continuum_of_care
          - padd
          - gas_storage_region
          - unmapped
          - neighborhood
  - name: geo_level_label
    tests:
    - not_null
  - name: grain_rank
    tests:
    - not_null
  - name: fips_available
    tests:
    - not_null
  - name: h3_available
    tests:
    - not_null
  - name: is_active
    tests:
    - not_null
  - name: source_snow_cybersyn_level
    description: 'Exact LEVEL string on SOURCE_SNOW.GLOBAL_GOVERNMENT.CYBERSYN.GEOGRAPHY_INDEX (and related geo tables). Null
      when this geo_level_code is catalog-only (e.g. property, zip, national).

      '
    tests:
    - unique:
        config:
          where: source_snow_cybersyn_level is not null and trim(source_snow_cybersyn_level) <> ''
  - name: geography_class
    tests:
    - not_null
  - name: supported_in_reference
    tests:
    - not_null
  - name: shape_expected
    tests:
    - not_null
  - name: code_system
    tests:
    - not_null
  - name: geo_level_notes
- name: frequency
  description: Canonical time grain vocabulary
  config:
    schema: CATALOG
  columns:
  - name: frequency_id
    tests:
    - not_null
    - unique
  - name: frequency_code
    tests:
    - not_null
    - unique
    - accepted_values:
        arguments:
          values:
          - daily
          - weekly
          - monthly
          - quarterly
          - annual
          - varies
  - name: frequency_label
    tests:
    - not_null
  - name: days_interval
    tests:
    - not_null
  - name: sort_order
    tests:
    - not_null
  - name: is_active
    tests:
    - not_null
- name: concept
  description: Canonical concept vocabulary
  config:
    schema: CATALOG
  columns:
  - name: concept_id
    tests:
    - not_null
    - unique
  - name: concept_code
    tests:
    - not_null
    - unique
  - name: concept_label
    tests:
    - not_null
  - name: domain
    description: FK to REFERENCE.CATALOG.DOMAIN.domain_code (seed domain.csv). Policy docs/rules/CONCEPT_DOMAIN_POLICY.md
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('domain')
          field: domain_code
  - name: unit
    tests:
    - not_null
  - name: direction
    tests:
    - not_null
    - accepted_values:
        arguments:
          values:
          - positive
          - negative
          - neutral
  - name: is_active
    tests:
    - not_null
  - name: metric_category_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('erf__metric_category')
          field: category_code
- name: concept_geo_level
  description: 'Bridge from concept_code to supported geo_level_code values (replaces comma-delimited CONCEPT.geo_level_codes).
    Empty / missing lists in the legacy column were never valid; grain is explicit per row.

    '
  config:
    schema: CATALOG
  columns:
  - name: concept_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('concept')
          field: concept_code
  - name: geo_level_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('geo_level')
          field: geo_level_code
  - name: is_primary
    tests:
    - not_null
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - concept_code
        - geo_level_code
- name: concept_frequency
  description: 'Bridge from concept_code to supported frequency_code values (replaces comma-delimited CONCEPT.frequency_codes).

    '
  config:
    schema: CATALOG
  columns:
  - name: concept_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('concept')
          field: concept_code
  - name: frequency_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('frequency')
          field: frequency_code
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - concept_code
        - frequency_code
- name: concept_vertical
  description: 'Bridge from concept_code to vertical_code. NULL legacy vertical_codes meant “all verticals”; that scope is
    represented as one row per vertical from reference.catalog.vertical.

    '
  config:
    schema: CATALOG
  columns:
  - name: concept_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('concept')
          field: concept_code
  - name: vertical_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('vertical')
          field: vertical_code
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - concept_code
        - vertical_code
- name: cybersyn_catalog_table_vendor_map
  description: 'Maps each distinct Snowflake table_name from the Cybersyn GLOBAL_GOVERNMENT share list to an underlying statistical-agency
    vendor_code (not the Snowflake republisher alone). Used by dbt tests and governance reviews; keep aligned with CYBERSYN_GLOBAL_GOVERNMENT_BRING_IN_MATRIX.md
    tiers.

    '
  config:
    schema: CATALOG
  columns:
  - name: table_name
    tests:
    - not_null
    - unique
  - name: domain_family_key
    tests:
    - not_null
  - name: underlying_vendor_code
    tests:
    - not_null
    - relationships:
        arguments:
          to: ref('vendor')
          field: vendor_code
  - name: matrix_tier
    tests:
    - not_null
    - accepted_values:
        arguments:
          values:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 88
          - 99
  - name: is_pit_companion
    tests:
    - not_null
    - accepted_values:
        arguments:
          values:
          - 'true'
          - 'false'
