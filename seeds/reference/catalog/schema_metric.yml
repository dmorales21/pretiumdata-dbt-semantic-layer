version: 2

seeds:
  - name: metric
    description: >
      Built canonical metric registry (generated from metric_raw.csv — see
      scripts/reference/catalog/build_metric_csv_from_metric_raw.py and
      docs/reference/METRIC_CSV_BUILD_SPEC.md). Loaded to REFERENCE.CATALOG.METRIC.
    config:
      schema: CATALOG
    columns:
      - name: metric_id
        tests: [not_null, unique]
      - name: metric_code
        tests: [not_null, unique]
      - name: metric_label
        tests: [not_null]
      - name: concept_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_code
      - name: vendor_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vendor')
                field: vendor_code
      - name: geo_level_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('geo_level')
                field: geo_level_code
      - name: frequency_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('frequency')
                field: frequency_code
      - name: data_status_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('erf__data_status')
                field: data_status_code
      - name: metric_category_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('erf__metric_category')
                field: category_code
      - name: unit
        # unit vocabulary: seeds/reference/catalog/unit.csv — do not add values here.
        tests:
          - not_null
          - dbt_utils.relationships_where:
              to: ref('unit')
              field: unit_code
              from_condition: "upper(trim(to_varchar(is_active))) in ('TRUE', '1', 'T')"

    tests:
      - dbt_utils.expression_is_true:
          name: metric_active_transform_dev_requires_column_and_three_part_path
          arguments:
            expression: >
              (LOWER(TRIM(TO_VARCHAR(data_status_code))) <> 'active')
              OR (UPPER(TRIM(TO_VARCHAR(is_active))) NOT IN ('TRUE', '1', 'T'))
              OR (UPPER(TRIM(TO_VARCHAR(table_path))) NOT LIKE 'TRANSFORM.DEV%')
              OR (
                TRIM(TO_VARCHAR(snowflake_column)) IS NOT NULL
                AND TRIM(TO_VARCHAR(snowflake_column)) <> ''
                AND SPLIT_PART(UPPER(TRIM(TO_VARCHAR(table_path))), '.', 1) = 'TRANSFORM'
                AND SPLIT_PART(UPPER(TRIM(TO_VARCHAR(table_path))), '.', 2) = 'DEV'
                AND TRIM(SPLIT_PART(UPPER(TRIM(TO_VARCHAR(table_path))), '.', 3)) <> ''
              )
