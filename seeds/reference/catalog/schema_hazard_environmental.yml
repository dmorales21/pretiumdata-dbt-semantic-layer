version: 2

seeds:
  - name: flood_zone
    description: FEMA flood zone classification
    config:
      schema: CATALOG
    columns:
      - name: flood_zone_id
        tests: [not_null, unique]
      - name: flood_zone_code
        tests: [not_null, unique]
      - name: flood_zone_label
        tests: [not_null]
      - name: fema_zone
        tests: [not_null]
      - name: is_high_risk
        tests: [not_null]
      - name: sort_order
        tests: [not_null]
      - name: is_active
        tests: [not_null]

  - name: natural_hazard_type
    description: Natural hazard type; FEMA NRI tracked flag
    config:
      schema: CATALOG
    columns:
      - name: hazard_type_id
        tests: [not_null, unique]
      - name: hazard_type_code
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [flood, wildfire, earthquake, hurricane, tornado, hail, winter_storm, drought]
      - name: hazard_type_label
        tests: [not_null]
      - name: fema_tracked
        tests: [not_null]
      - name: sort_order
        tests: [not_null]
      - name: is_active
        tests: [not_null]

  - name: insurance_type
    description: Insurance type with required flag and hazard linkage
    config:
      schema: CATALOG
    columns:
      - name: insurance_type_id
        tests: [not_null, unique]
      - name: insurance_type_code
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [hazard, flood, wind, earthquake, liability, title]
      - name: insurance_type_label
        tests: [not_null]
      - name: is_required
        tests: [not_null]
      - name: sort_order
        tests: [not_null]
      - name: is_active
        tests: [not_null]
      - name: hazard_type_code
        tests:
          - relationships:
              arguments:
                to: ref('natural_hazard_type')
                field: hazard_type_code
              severity: warn
