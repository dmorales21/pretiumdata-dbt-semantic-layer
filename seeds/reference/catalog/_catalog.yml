version: 2

# ============================================================
# REFERENCE.CATALOG — seed documentation
# Owner: Alex
# All catalog seed tables live here. This file documents them as
# dbt sources so models can ref() them via source() calls.
# Naming convention: source('catalog', '<table_name>')
# ============================================================

sources:
  - name: catalog
    database: REFERENCE
    schema: CATALOG
    description: >
      Controlled vocabulary and dimension registry for the Pretium data warehouse.
      All prefixes, grain values, and dimension codes used anywhere in the warehouse
      must exist as active rows here before use.
      Owner: Alex. Seeded via dbt seed --target reference.

    tables:
      # Wave 1 — core dimensions + consolidated small enums (single tall seed)
      - name: vertical
        description: Investment vertical registry (RED, REQ, RESI)
      - name: domain
        description: >
          Concept domain vocabulary (capital, housing, household, place, portfolio). CONCEPT.domain FK;
          see docs/rules/CONCEPT_DOMAIN_POLICY.md
      - name: frequency
        description: Canonical time grain vocabulary
      - name: geo_level
        description: Canonical geography grain vocabulary; property through national
      - name: catalog_enum_source
        description: >
          Tall merged seed for ~57 small enumerations (data_status, tiers, types, statuses) that were
          previously separate CSVs. **`catalog_enum`** unions this with **frequency**, **asset_type**, and
          **tenant_type**. dbt **`relationships`** tests use ephemeral **`erf__*`** models over this seed;
          see **docs/migration/ENUM_CONSOLIDATION_DBT_REFS.md** and **scripts/reference/catalog/build_catalog_enum_source_seed.py**.
      - name: asset_type
        description: Asset scope for an offering (property portfolio or geography-first); unioned into **ENUM**
      - name: tenant_type
        description: B2B consumer class for governed analytics access (IC internal DS OpCo demo); unioned into **ENUM**

      # Wave 2 — depend on Wave 1
      - name: product_type
        description: Investment product type with vertical, SFR/MF flags, bedroom defaults
      - name: unit
        description: Canonical metric unit codes; FK target for **metric.unit** / **metric_raw.unit**
      - name: bedroom_type
        description: Bedroom-band vocabulary; **bridge_product_type_bedroom_type** is authoring source for product ↔ bedroom scope
      - name: bridge_product_type_bedroom_type
        description: Bridge product_type_code → bedroom_type_code + sort_order (machine-syncs **product_type.bedroom_type_codes** until column drop)
      - name: concept
        description: Canonical concept vocabulary; supported grains / frequencies / verticals live in bridge seeds concept_geo_level, concept_frequency, concept_vertical
      - name: concept_geo_level
        description: Bridge concept_code → geo_level_code (replaces CONCEPT.geo_level_codes)
      - name: concept_frequency
        description: Bridge concept_code → frequency_code (replaces CONCEPT.frequency_codes)
      - name: concept_vertical
        description: Bridge concept_code → vertical_code (replaces CONCEPT.vertical_codes; all-verticals = cross join)
      - name: concept_explanation
        description: >
          Canonical prose for each concept (description, definition, explanation); promoted from REFERENCE.DRAFT.

      # Wave 3 — opco (no longer depends on class / loan ladder seeds as separate tables)
      - name: opco
        description: Operating company registry; unit_count requires manual population

      # Wave 4 — business_team (independent of former Wave 3 enum ladder)
      - name: business_team
        description: Consumer team registry with Snowflake role and MotherDuck access flag

      # Wave 6 — manual population required before seeding
      - name: vendor
        description: Vendor registry; populate manually before seeding
      - name: dataset
        description: Dataset registry; populate after vendor; one row per vendor x concept x geo x frequency
      - name: dataset_product_type
        description: Bridge dataset_code → product_type_code (replaces DATASET.product_type_codes)
      - name: dataset_vertical
        description: Bridge dataset_code → vertical_code (replaces DATASET.vertical_codes)
      - name: metric_raw
        description: >
          Bulk / hand-maintained metric backlog (FACT + non-FACT registrations). Built **metric** seed
          is generated from this file — see **docs/reference/METRIC_CSV_BUILD_SPEC.md**.
      - name: metric
        description: Metric registry (generated from metric_raw + FK closure); populate after dataset; requires snowflake_column and table_path
      - name: metric_derived
        description: >
          Analytics-layer metric registry (FEATURE_* / MODEL_* / ESTIMATE_* logical outputs).
          Depends on catalog_enum_source (via FK tests / erf__*), metric, concept, geo_level, frequency.
          Layout doc: docs/reference/CATALOG_METRIC_DERIVED_LAYOUT.md

      - name: metric_derived_input
        description: >
          Bridge from metric_derived to one or more upstream metric_code rows (N:1 inputs; WL_040).
          Load after metric_derived and metric. Layout: docs/reference/CATALOG_METRIC_DERIVED_LAYOUT.md §6.

      - name: concept_definition_package
        description: >
          Concept definition contract (one row per concept_code) with canonical grain, vendor priority,
          QA bounds, slot policy, and required semantic-layer keys for assignment governance.

      # Wave 6d — backlog / wishlist (no FK to concept; free-text ontology slugs)
      - name: catalog_wishlist
        description: >
          REFERENCE.CATALOG.wishlist — not-yet-deliverable items (concept chains, infra, catalog gaps).
          Doc: docs/reference/CATALOG_WISHLIST.md

      # Wave 7 — tearsheet / offering (seed **asset_type** / **tenant_type** in Wave 1 before `catalog_enum`)
      - name: offering
        description: Commercial analytics offering distinct from dataset vendor x concept grain
      - name: bridge_offering_product_type
        description: Offering to product_type applicability
      - name: bridge_offering_asset_type
        description: Offering to asset_type scope modes
      - name: bridge_tenant_type_offering
        description: Tenant type to offering access with default access tier
      - name: bridge_product_type_metric
        description: Product type to metric linkage; populate after metric seed has rows
      - name: offering_signal_relevance
        description: Concept-level signal relevance per offering until metric grain is authoritative
      - name: concept_offering_weight
        description: >
          Presley offering × concept numeric weights (0–5); matrix YAML in offering_concept_weight_matrix.yml
